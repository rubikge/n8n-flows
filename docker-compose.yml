volumes:
  n8n_data:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=true
      # Whitelist host-mounted directory for the Read/Write Files from Disk node.
      # Paths are separated by ';'. Keep ~/.n8n-files (the default) and add /files.
      - N8N_RESTRICT_FILE_ACCESS_TO=/files;~/.n8n-files
      - WEBHOOK_URL=${WEBHOOK_URL}
    volumes:
      # Saves your n8n workflow data permanently in a Docker volume
      - n8n_data:/home/node/.n8n
      - ./n8n-files:/files
